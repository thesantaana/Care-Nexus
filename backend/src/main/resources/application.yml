server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: care-nexus-backend
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/care_nexus?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:care_nexus}
    password: ${DB_PASSWORD:change-me}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

care-nexus:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:5174
      - http://127.0.0.1:5174
  file-storage:
    root-path: ${FILE_STORAGE_ROOT:uploads}
    image-max-size-bytes: ${FILE_STORAGE_IMAGE_MAX_SIZE_BYTES:10485760}
    document-max-size-bytes: ${FILE_STORAGE_DOCUMENT_MAX_SIZE_BYTES:52428800}
    video-max-size-bytes: ${FILE_STORAGE_VIDEO_MAX_SIZE_BYTES:524288000}
    allowed-extensions:
      - jpg
      - jpeg
      - png
      - webp
      - pdf
      - ppt
      - pptx
      - doc
      - docx
      - mp4
      - webm
    allowed-mime-prefixes:
      - image/
      - application/pdf
      - application/vnd.ms-powerpoint
      - application/vnd.openxmlformats-officedocument.presentationml.presentation
      - application/msword
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - video/
    blocked-extensions:
      - exe
      - bat
      - cmd
      - sh
      - js
      - jsp
      - php
    extension-mime-types:
      jpg:
        - image/jpeg
      jpeg:
        - image/jpeg
      png:
        - image/png
      webp:
        - image/webp
      pdf:
        - application/pdf
      ppt:
        - application/vnd.ms-powerpoint
      pptx:
        - application/vnd.openxmlformats-officedocument.presentationml.presentation
      doc:
        - application/msword
      docx:
        - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      mp4:
        - video/mp4
      webm:
        - video/webm
  ai:
    mode: ${AI_MODE:mock}
  jwt:
    secret: ${CARE_NEXUS_JWT_SECRET:local-dev-demo-secret-change-before-real-use-32}
    expiration-seconds: ${CARE_NEXUS_JWT_EXPIRATION_SECONDS:7200}
  health-threshold:
    systolic-low: ${HEALTH_SYSTOLIC_LOW:90}
    systolic-high: ${HEALTH_SYSTOLIC_HIGH:140}
    diastolic-low: ${HEALTH_DIASTOLIC_LOW:60}
    diastolic-high: ${HEALTH_DIASTOLIC_HIGH:90}
    glucose-low: ${HEALTH_GLUCOSE_LOW:3.9}
    glucose-high: ${HEALTH_GLUCOSE_HIGH:7.0}
    heart-rate-low: ${HEALTH_HEART_RATE_LOW:60}
    heart-rate-high: ${HEALTH_HEART_RATE_HIGH:100}
    temperature-low: ${HEALTH_TEMPERATURE_LOW:35.0}
    temperature-high: ${HEALTH_TEMPERATURE_HIGH:37.3}
